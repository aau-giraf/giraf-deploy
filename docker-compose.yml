services:
  # ── giraf-core (Django) ─────────────────────────────────
  core-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: giraf_core
      POSTGRES_USER: giraf
      POSTGRES_PASSWORD: ${GIRAF_DB_PASSWORD:-localdev123}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - core-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giraf -d giraf_core"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - core-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    build: ../giraf-core
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - core-media-data:/app/media
    depends_on:
      core-db:
        condition: service_healthy
      core-redis:
        condition: service_healthy
    env_file: ../giraf-core/.env
    environment:
      # These override .env because they're internal to the compose network
      POSTGRES_HOST: core-db
      POSTGRES_PORT: "5432"
      GIRAF_AI_URL: "http://giraf-ai:8100"
      REDIS_URL: redis://core-redis:6379/0
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py runserver 0.0.0.0:8000"

  # ── giraf-ai (FastAPI) ──────────────────────────────────
  giraf-ai:
    build: ../giraf-ai
    restart: unless-stopped
    ports:
      - "8100:8100"
    env_file: ../giraf-ai/.env

  # ── weekplanner (ASP.NET) ───────────────────────────────
  weekplanner-db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${GIRAF_DB_PASSWORD:-localdev123}
      POSTGRES_DB: giraf_dev
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - weekplanner-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  weekplanner-api:
    build:
      context: ../weekplanner/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5171:5171"
    depends_on:
      weekplanner-db:
        condition: service_healthy
    env_file: ../weekplanner/.env
    environment:
      # These override .env because they're internal to the compose network
      ConnectionStrings__DbConnection: "Host=weekplanner-db;Port=5432;Database=giraf_dev;Username=postgres;Password=${GIRAF_DB_PASSWORD:-localdev123}"
      GirafCore__BaseUrl: "http://core-api:8000"

volumes:
  core-db-data:
  core-media-data:
  core-redis-data:
  weekplanner-db-data:
